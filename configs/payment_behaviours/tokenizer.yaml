#
# CURATED tokenizer field schema for the payment-behaviours asset.
#
# Unlike the mortgage schema this is written by hand, not generated by classify_schema.py:
# the asset has exactly ONE feature (days-past-due), so auto-classification adds nothing and
# would emit an empty `profile:` branch plus no `time_field`. The numeric BINS are still fit on
# the TRAIN split only, at tokenizer-fit time (train_tokenizer.py -> tokenizer.json), so the
# DL-008 train-only discipline is preserved — only the field *structure* is fixed here.
#
#   time_field = seq_index  -> the per-invoice "t=" coordinate (invoice number = age-in-invoices),
#                              the analogue of the mortgage `loan_age`.
#   time_col   = reporting_date (pseudo-calendar month-end) -> orders events; no `cal=` token is
#                              emitted (no calendar: key) because the pseudo-dates carry no macro
#                              signal.
#   dpd is the only event feature; `0` (paid on time/early) is always its own bucket, and the
#   anchors force bin boundaries at the business cliffs (1 / 8 / 31 / 61 / 91 days).

schema: payment_behaviours
id_col: loan_id
time_col: reporting_date
time_field: seq_index

n_bins: 16
max_events: 128            # p95 history is ~243 invoices; keep the most recent 128 (median is 8)

profile:                   # no static fields on this asset — the [USR] token anchors the branch
  numeric: []
  categorical: []

event:                     # per-invoice dynamics
  numeric:
    - dpd
  categorical: []

anchors:                   # forced bin boundaries at DPD business cliffs (1 / 7 / 30 / 60 / 90)
  dpd: [1, 8, 31, 61, 91]
