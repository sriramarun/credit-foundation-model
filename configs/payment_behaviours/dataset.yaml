#
# Dataset contract — anonymized B2B invoice payment-behaviour sequences.
# See configs/mortgage_performance/dataset.yaml for the contract documentation.
#
# One deliberate departure from the mortgage contract, documented here because it is the
# most important modelling decision on this asset: the days-past-due history (`dpd`) is the
# ONLY behavioural signal in the data, so it is a FEATURE, not leakage. Honesty is preserved
# the same way as everywhere else in the framework: labels are strictly FORWARD of the
# observation cutoff, and each label's gate excludes customers for whom the event has
# already fired at the cutoff (no "predicting" a state you are already in). The label event
# and gate columns themselves are machine-enforced leakage as usual.

dataset:
  name: payment_behaviours
  adapter: payment_behaviours      # reference_implementations/payment_behaviours/adapter.py
  id_col: loan_id                  # customer_id (sha-256 string), framework-standard name
  time_col: reporting_date         # PSEUDO-time: month-end of (base_month + invoice index)
  origination_col: origination_date  # constant base month-end -> split degrades to
                                     # entity-disjoint by (hashed, effectively random) id order

labels:
  late30_3m:                       # among customers currently <=30 dpd: do they exceed
    type: forward_event            # 30 dpd within the next 3 invoices?
    event_col: late30_event
    horizon_months: 3              # pseudo-months == invoices (one per sequence position)
    gate_col: under30
  late90_6m:                       # among customers currently <=90 dpd: do they exceed
    type: forward_event            # 90 dpd within the next 6 invoices?
    event_col: late90_event
    horizon_months: 6
    gate_col: under90

schema: configs/payment_behaviours/tokenizer.yaml   # generated by classify_schema.py

exclude:                           # structural non-features
  - origination_date               # constant pseudo-date — the split key, not a feature
  - seq_index                      # duplicate of the tokenizer's t= coordinate

leakage:                           # label ingredients — never features (machine-enforced)
  - late30_event
  - late90_event
  - under30
  - under90
