#
# Shared base for all payment-behaviours pipeline recipes (include: common.yaml).
# The corpus is small (~25M invoice rows, ~600k customers) — everything lives on local disk;
# no GCS round-trips needed. Switch runs with a single override: --run_name run_pb_v2

run_name: run_pb_v1
data_root: /workspace/data/payment_behaviours
key: null   # local disk, no GCS auth (ensure_auth no-ops)

dataset: configs/payment_behaviours/dataset.yaml   # the dataset contract (cols/labels/leakage)
tokenizer: configs/payment_behaviours/tokenizer.json  # KVT vocab (train-only fit, DL-008)
schema: configs/payment_behaviours/tokenizer.yaml     # field schema (generated by classify)

paths:
  raw: ${data_root}/raw
  processed: ${data_root}/processed/${run_name}
  encoded: ${data_root}/encoded/${run_name}
  embeddings: ${data_root}/embeddings/${run_name}
  runs: ${data_root}/runs

seed: 42
