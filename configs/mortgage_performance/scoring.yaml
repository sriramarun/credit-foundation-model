#
# Batch-score a portfolio with a fine-tuned Credit FM (deliverable #6).
#
#   python scripts/score_portfolio.py -c configs/mortgage_performance/scoring.yaml
#   python scripts/score_portfolio.py -c configs/mortgage_performance/scoring.yaml \
#       --panel gs://.../some_portfolio.parquet --cutoff 2023-12-31 --out gs://.../scores.parquet

include: common.yaml

# the fine-tuned model saved by `finetune.py --save` (backbone + trained head; carries its finetune
# metadata so the scorer can rebuild LoRA/full/frozen). NOT the plain pretrained checkpoint.
checkpoint: ${paths.runs}/m5_full_ft.pt
tokenizer: configs/mortgage_performance/tokenizer.json     # frozen KVT vocab (must match the checkpoint)
schema: configs/mortgage_performance/tokenizer.yaml        # id_col / time_col

panel: ${paths.raw}/panel_2000_2024.parquet      # the portfolio to score (needs rows at the cutoff)
cutoff: "2023-12-31"                              # observation date — history truncated to <= this
gate: true                                        # keep only loans performing at the cutoff
gate_col: is_performing                           # null (or gate: false) scores every loan
out: ${paths.runs}/portfolio_scores.parquet       # writes scores + a <out>_manifest.json sidecar

calibrator: null                                   # calibrator.json from calibrate.py (G6.1);
                                                   # adds a calibrated `pd` column (ranks unchanged)
limit: 0                                           # 0 = all loans; >0 = first N (smoke test)
batch_size: 256
workers: 0
engine: vector                                     # vectorized NumPy encode (token-identical, faster)
