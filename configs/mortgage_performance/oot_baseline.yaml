#
# Out-of-time (calendar-split) Gate-G1 baseline. Default = the crisis stress test.
#
#   python scripts/build_oot_baseline.py -c configs/mortgage_performance/oot_baseline.yaml
#   python scripts/build_oot_baseline.py -c configs/mortgage_performance/oot_baseline.yaml \
#       --train_years 2000-2022 --test_years 2023-2025 --report reports/mortgage_oot_recent.md

include: common.yaml

train_years: "2000-2006"
test_years: "2008-2010"
sample_pct: 20             # loan % kept (hash on loan id)
horizon_months: 12
loan_split: disjoint       # disjoint | overlap — disjoint: a loan is wholly train OR test
embargo_years: 0           # extra gap between train label windows and the test period
neg_per_pos: 0             # downsample TRAIN negatives to N x positives (0 = keep all)
device: cuda               # xgboost device

task_config: configs/mortgage_performance/baseline.yaml
raw_schema: configs/mortgage_performance/raw_schema.yaml
gcp_project: vertical-backup-493310-b4
source_prefix: parquet/    # acquisition-cohort files under gs://<bucket>/<prefix>

staging: /workspace/staging_oot
workers: 6
duckdb_threads: 4
duckdb_memory: 48GB

limit: null                # first N cohort files (smoke test)
report: reports/mortgage_oot_crisis.md
