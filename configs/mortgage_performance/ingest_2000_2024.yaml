#
# Full-history ingest: 2000Q1-2024Q4, 4% loan sample -> one panel for the calendar-OOT program.
# The pretrain corpus is derived from this panel by prepare_data with reporting_max=2022-12-31
# (the model never sees a 2023+ month); eval/finetune read the full panel for forward labels.
#
#   python -u scripts/ingest_mortgage_performance.py -c configs/mortgage_performance/ingest_2000_2024.yaml

include: common.yaml

sources:
  files: null
  root: ${gcs_root}/raw_by_reporting
  reporting: [2000Q1, 2000Q2, 2000Q3, 2000Q4, 2001Q1, 2001Q2, 2001Q3, 2001Q4, 2002Q1, 2002Q2, 2002Q3, 2002Q4, 2003Q1, 2003Q2, 2003Q3, 2003Q4, 2004Q1, 2004Q2, 2004Q3, 2004Q4, 2005Q1, 2005Q2, 2005Q3, 2005Q4, 2006Q1, 2006Q2, 2006Q3, 2006Q4, 2007Q1, 2007Q2, 2007Q3, 2007Q4, 2008Q1, 2008Q2, 2008Q3, 2008Q4, 2009Q1, 2009Q2, 2009Q3, 2009Q4, 2010Q1, 2010Q2, 2010Q3, 2010Q4, 2011Q1, 2011Q2, 2011Q3, 2011Q4, 2012Q1, 2012Q2, 2012Q3, 2012Q4, 2013Q1, 2013Q2, 2013Q3, 2013Q4, 2014Q1, 2014Q2, 2014Q3, 2014Q4, 2015Q1, 2015Q2, 2015Q3, 2015Q4, 2016Q1, 2016Q2, 2016Q3, 2016Q4, 2017Q1, 2017Q2, 2017Q3, 2017Q4, 2018Q1, 2018Q2, 2018Q3, 2018Q4, 2019Q1, 2019Q2, 2019Q3, 2019Q4, 2020Q1, 2020Q2, 2020Q3, 2020Q4, 2021Q1, 2021Q2, 2021Q3, 2021Q4, 2022Q1, 2022Q2, 2022Q3, 2022Q4, 2023Q1, 2023Q2, 2023Q3, 2023Q4, 2024Q1, 2024Q2, 2024Q3, 2024Q4]

out: ${paths.raw}
combined_name: panel_2000_2024.parquet
sample_pct: 4              # ~4B rows full -> ~160M rows; hash on loan_id (consistent subset)
workers: 8
sharded: true              # one part-<quarter>.parquet per source under <out>/panel_2000_2024/;
                           # killed run? rerun the same command — completed quarters are skipped
combine: false             # true ALSO writes the v1.0 single file (RAM-bound; never at 100%)
