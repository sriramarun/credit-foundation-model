#
# SCALING experiment: ~100M-param model (dim 768) on the 10% corpus (~3B tokens). This is the real
# data+model scaling test (vs the 65M-on-4% probe, which was flat/data-bound). Chinchilla-sound:
# 100M x ~20 tokens/param = 2B needed; the 10% corpus (~3B) covers it with headroom.
#
#   python scripts/pretrain.py -c configs/mortgage_performance/pretrain_100m.yaml
#
# Needs FlashAttention (SDPA, now in models/base.py) — the big batch below wouldn't fit otherwise.

include: common.yaml

run_name: run_2000_2022_10pct    # 10% corpus, reporting_max 2022-12-31 (pretrain blind to the OOT era)

data:
  train_dir: ${paths.encoded}/train
  val_dir: ${paths.encoded}/val
  batch_size: 64                 # MICRO-batch (fits a 100M/dim-768 model on one H100); see grad_accum
  num_workers: 4
  limit: null

model:                           # 100.9M params @ dim 768 (verified)
  dim: 768
  n_heads: 8                     # head_dim 96
  profile_layers: 3
  event_layers: 5
  history_layers: 6
  dropout: 0.1

optimizer:
  lr: 3.0e-4                     # same recipe as 26M/65M (keep comparable); warmup + grad_clip guard it
  weight_decay: 0.01
  warmup: 1000
  grad_clip: 1.0

schedule:
  steps: 20000                   # effective-batch 256 x ~500 tok/loan x 20k ~= 2.5B tokens (Chinchilla)
  grad_accum: 4                  # 64 micro-batch x 4 = 256 effective; fits memory, same token budget
  log_every: 50
  val_every: 1000                # best-val checkpoint restored at the end

runtime:
  device: null
  bf16: true

checkpoint:
  out: ${paths.runs}/m_100m.pt
  every: 1000                    # mid-run step checkpoints (<out>.stepN.pt); 0 = off
  keep: 2                        # rotate: keep the newest N step files

logging:                         # structured metrics (G4c; stdout printing is unchanged)
  backend: null                  # null | jsonl | tensorboard | wandb (offline by default)
  dir: runs/logs                 # jsonl/tensorboard output dir (local)
  project: credit-fm             # wandb project
  run_name: null                 # null = backend default
  mode: offline                  # wandb: offline = nothing leaves the box (DL-009)

resume: null                     # null | auto (newest step file) | explicit path;
                                 # a killed run restarts with:  --resume auto
