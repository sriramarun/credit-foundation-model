# Auto-generated by scripts/classify_schema.py — REVIEW before use.
# Vocab + numeric bins fit on data/processed/train.parquet ONLY (decision DL-008).
schema: esma_annex2
id_col: loan_id
time_col: reporting_date        # observation cutoff -> temporal coordinate
num_buckets: 16
zero_bucket: true

drop:        # constant / no-signal columns
  - transaction_name
  - esma_transaction_identifier
  - closing_date
  - originator_name
  - servicer_name
  - currency
  - country
  - guarantee_type
  - property_valuation_type
  - interest_payment_frequency
  - principal_payment_frequency

profile:        # static fields
  numeric:
    - original_balance
    - current_interest_rate_pct
    - oltomv_original
    - original_market_value_at_origination
    - loan_to_income
    - payment_due_to_income_pct
    - borrower_annual_income
    - scheduled_monthly_payment
    - construction_deposit_amount
  categorical:
    - origination_year
    - repayment_type
    - rate_type
    - legal_maturity_months
    - loan_part_count
    - debtor_count
    - property_type
    - province
    - economic_region_nuts3
    - construction_year
    - occupancy
    - property_usage
    - employment_status
    - borrower_type
    - loan_purpose
    - epc_label
    - epc_issue_year
    - primary_energy_demand_kwh_m2
    - construction_deposit_pct
  flags:
    - interest_only_flag
    - self_employed_flag
    - buy_to_let_flag
    - nhg_flag
    - forbearance_flag
    - restructuring_flag
    - construction_deposit_flag
  buckets:
    - oltomv_original_bucket
    - loan_to_income_bucket
    - payment_due_to_income_pct_bucket
    - construction_year_bucket

event:        # dynamic fields
  numeric:
    - current_balance
    - remaining_interest_fixed_period_months
    - fixed_interest_period_end_in_months
    - seasoning_months
    - remaining_term_months
    - cltomv_current
    - cltimv_current
    - current_original_market_value
    - indexed_market_value
    - arrears_amount
  categorical:
    - days_past_due
    - performing_status
  flags:
    - default_crr_flag
    - foreclosure_flag
  buckets:
    - arrears_bucket
    - balance_bucket
    - cltomv_current_bucket
    - cltimv_current_bucket

temporal:
  reference: origination
  log_seconds: true
  cyclical: [month, quarter]
