# Pretraining hyperparameters — Dutch mortgages.
backend: hf                # hf | nemo
optimizer: adamw
learning_rate: 3.0e-4
warmup_steps: 500
lr_decay: cosine
per_gpu_batch_size: 64
sequence_length: 512
epochs: 5
grad_clip: 1.0
precision: bf16
masking: {token_rate: 0.15, event_rate: 0.10, type_rate: 0.10}
wandb_project: credit-foundation-model
