# Credit Foundation Model Pretraining — Decoder-Only
#
# NeMo AutoModel-style config for pretraining a decoder foundation model on
# credit event sequences via causal language modeling. Mirrors NVIDIA's
# configs/pretrain_financial_decoder.yaml, adapted to the credit schema.
# Swap in any HuggingFace-compatible decoder by editing model.config.
#
# Launch (multi-GPU, recommended):
#   torchrun --nproc-per-node=8 scripts/train_decoder_model.py \
#       -c configs/pretrain_credit_decoder.yaml \
#       --dataset.data_path data/decoder_corpus/train_corpus.txt \
#       --validation_dataset.data_path data/decoder_corpus/val_corpus.txt
#
# Start small (Credit-TFM-S, ~30M) then scale to Credit-TFM-M (100M-250M).

# -- Model ----------------------------------------------------------------
# vocab_size must match CreditTabularTokenizer output (placeholder below).
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.LlamaConfig
    vocab_size: 6251              # TODO: set to credit tokenizer vocab size
    hidden_size: 512
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 2        # GQA
    intermediate_size: 1408       # SwiGLU FFN
    max_position_embeddings: 8192 # RoPE allows extrapolation
    rope_theta: 500000.0
    hidden_act: silu
    rms_norm_eps: 1.0e-5
    attention_dropout: 0.0
    tie_word_embeddings: false
    bos_token_id: 1
    eos_token_id: 2
    pad_token_id: 0

# -- Datasets -------------------------------------------------------------
dataset:
  _target_: src/clm_data.py:build_credit_clm_dataset
  data_path: null
  hash_size: 2000
  seq_length: 4096

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate

validation_dataset:
  _target_: src/clm_data.py:build_credit_clm_dataset
  data_path: null
  hash_size: 2000
  seq_length: 4096

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate

# -- Training Schedule ----------------------------------------------------
step_scheduler:
  global_batch_size: 16
  local_batch_size: 16
  ckpt_every_steps: 15
  val_every_steps: 15
  num_epochs: 20
  max_steps: 30                   # demo value; raise for real runs

# -- Distribution ---------------------------------------------------------
dist_env:
  backend: nccl
  timeout_minutes: 5

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  dp_size: none
  dp_replicate_size: 1
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

# -- Loss / Optim ---------------------------------------------------------
loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  lr: 0.0002
  weight_decay: 0.077

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 10
  min_lr: 0.0000065

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

# -- Checkpointing --------------------------------------------------------
checkpoint:
  enabled: true
  checkpoint_dir: models/credit-decoder-model/checkpoints/
  model_save_format: safetensors
  save_consolidated: true
  model_repo_id: custom-credit-decoder
