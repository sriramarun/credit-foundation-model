#
# MLM pretraining recipe for the three-branch credit foundation model.
#
#   Full run:  python scripts/pretrain.py -c configs/fannie_mae/pretrain.yaml
#   Toy run:   python scripts/pretrain.py -c configs/fannie_mae/pretrain.yaml \
#                  --data.limit 1000 --schedule.steps 100 --model.dim 256 \
#                  --checkpoint.out runs/toy.pt

include: common.yaml

data:
  train_dir: ${paths.encoded}/train
  val_dir: ${paths.encoded}/val
  batch_size: 128          # dense O(B*L^2) attention: 128 fits H100-80GB w/ expandable_segments
  num_workers: 4
  limit: null              # cap loans per split (toy runs)

model:                     # 25.5M params at dim=384 (Chinchilla-matched to ~450M tokens, DL-015)
  dim: 384
  n_heads: 8
  profile_layers: 3
  event_layers: 5
  history_layers: 6
  dropout: 0.1

optimizer:
  lr: 3.0e-4
  weight_decay: 0.01
  warmup: 500
  grad_clip: 1.0

schedule:
  steps: 20000
  log_every: 50
  val_every: 500           # best-val checkpoint restored at the end

runtime:
  device: null             # cuda|cpu (null = auto)
  bf16: true

checkpoint:
  out: ${paths.runs}/m3_full.pt
  every: 1000                    # mid-run step checkpoints (<out>.stepN.pt); 0 = off
  keep: 2                        # rotate: keep the newest N step files

logging:                         # structured metrics (G4c; stdout printing is unchanged)
  backend: null                  # null | jsonl | tensorboard | wandb (offline by default)
  dir: runs/logs                 # jsonl/tensorboard output dir (local)
  project: credit-fm             # wandb project
  run_name: null                 # null = backend default
  mode: offline                  # wandb: offline = nothing leaves the box (DL-009)

resume: null                     # null | auto (newest step file) | explicit path;
                                 # a killed run restarts with:  --resume auto
