#
# Calendar-OOT fine-tune: head trains on Dec-2016..Dec-2021 observations (label windows end
# <= Dec-2022), scored on Dec-2022 + Dec-2023 observations (labels land in 2023 and 2024).
# Loan-disjoint across eras; features bar = build_oot_baseline recent OOT (~0.784).
#
#   python scripts/finetune.py -c configs/fannie_mae/finetune_oot.yaml --mode lora

include: common.yaml

run_name: run_2000_2022
tokenizer: configs/fannie_mae/tokenizer_v2.json   # re-fit on the 2000-2022 train split (DL-008)

checkpoint: ${paths.runs}/m5_full.pt
panel: ${paths.raw}/panel_2000_2024.parquet       # full panel — forward labels need 2023-24 rows

task:
  train_cutoffs: ["2016-12-31", "2017-12-31", "2018-12-31", "2019-12-31", "2020-12-31", "2021-12-31"]
  test_cutoffs: ["2022-12-31", "2023-12-31"]
  horizon_months: 12
  label_col: default_event
  gate_col: is_performing

mode: lora                 # frozen | lora | full
lora:
  rank: 8
  alpha: 16

train:
  epochs: 3
  batch_size: 32           # 25-yr histories are long (up to 60 events) — smaller batch than M4
  lr: null
  weight_decay: 0.01
  grad_clip: 1.0
  neg_per_pos: 20
  pos_weight_cap: 100

split:
  test_frac: 0.3           # unused in OOT mode (calendar split governs); kept for fallback

workers: 32
features_bar: 0.784        # recent-OOT XGB bar (train 2000-2022, test 2023-25, no leakage)
report: reports/m5_oot_ft_lora.md
