#
# Fine-tune the pretrained FM on forward default (PRAGMA adaptation ladder).
#
#   python scripts/finetune.py -c configs/fannie_mae/finetune.yaml                 # lora (default)
#   python scripts/finetune.py -c configs/fannie_mae/finetune.yaml --mode frozen --report reports/ft_frozen.md
#   python scripts/finetune.py -c configs/fannie_mae/finetune.yaml --mode full --report reports/ft_full.md

include: common.yaml

checkpoint: ${paths.runs}/m3_full.pt
panel: ${paths.processed}/train.parquet

task:
  label: default_12m         # declarative task from dataset.yaml labels: (v1.1 G2.1)
  cutoff: "2016-12-31"


mode: lora                 # frozen | lora | full
lora:
  rank: 8                  # PRAGMA default (r=8)
  alpha: 16

train:
  epochs: 3
  batch_size: 128
  lr: null                 # null = per-mode default (frozen 1e-3, lora 5e-4, full 2e-5)
  weight_decay: 0.01
  grad_clip: 1.0
  neg_per_pos: 20          # downsample FIT negatives to N x positives (0 = keep all);
                           # rare-event stabilizer — monitor/test sets stay untouched
  pos_weight_cap: 100      # bound the class weight (raw neg/pos was ~900 at 0.11% base rate)

split:
  test_frac: 0.3

workers: 32                # parallel observation encoding (was the 5.5h serial stall)
engine: cpu                # cpu | vector | gpu (RAPIDS cuDF/CuPy)
features_bar: null         # features-XGB ROC from evaluate_downstream on the SAME population

runtime:
  device: null
  bf16: true

limit: null
report: reports/ft_lora.md
