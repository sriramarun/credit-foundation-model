#
# Encode-once: processed panel split -> token-id parquet shards + manifest.
#
#   python scripts/encode_dataset.py -c configs/fannie_mae/encode.yaml --split val
#   python scripts/encode_dataset.py -c configs/fannie_mae/encode.yaml --workers 8 --shard_size 10000

include: common.yaml

split: train
input: ${paths.processed}/${split}.parquet
output: ${paths.encoded}/${split}

shard_size: 50000        # loans per shard
workers: 32              # processes (spawn); 0/1 = in-process
