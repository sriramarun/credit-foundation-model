#
# Loan-stratified temporal train/val/test split (DL-007/008).
#
#   python scripts/prepare_data.py -c configs/fannie_mae/prepare.yaml
#   # Dutch panel (no origination column -> derive):
#   python scripts/prepare_data.py -c configs/fannie_mae/prepare.yaml \
#       --input data/raw/all_cutoffs.parquet --origination_col null --out_dir data/processed

include: common.yaml

input: ${paths.raw}/panel.parquet
id_col: loan_id
origination_col: origination_date   # null = derive from reporting_col - seasoning_col
reporting_col: reporting_date
seasoning_col: seasoning_months

out_dir: ${paths.processed}
fractions: [0.8, 0.1, 0.1]          # train, val, test (sum to 1.0)
