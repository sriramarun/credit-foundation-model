#
# Scale-up probe: ~65M-param model (dim 624) on the SAME data + tokenizer as the 25.7M M5 model.
# Chinchilla-matched to the ~1.2B-token 2000-2022 corpus (65M x ~20 tokens/param). Only the model
# SIZE changes vs pretrain.yaml — same 3-branch structure, same shards, same recipe — so any
# downstream OOT lift is attributable to scale, not data.
#
#   python scripts/pretrain.py -c configs/fannie_mae/pretrain_65m.yaml
#
# NOTE: run_name must match the encoded shards the 26M model trained on (paths.encoded/{train,val}).

include: common.yaml

run_name: run_2000_2022    # <-- the encoded 2000-2022 corpus (adjust if your shards live elsewhere)

data:
  train_dir: ${paths.encoded}/train
  val_dir: ${paths.encoded}/val
  batch_size: 64           # dim 624 activations are ~1.6x the 26M model -> halve the batch (128->64)
  num_workers: 4
  limit: null

model:                     # 66.8M params @ dim 624 (verified by the run script's param-count check)
  dim: 624
  n_heads: 8               # head_dim 78 (dim % 16 == 0 keeps it even)
  profile_layers: 3
  event_layers: 5
  history_layers: 6
  dropout: 0.1

optimizer:
  lr: 3.0e-4               # same recipe as the 26M run (keep it comparable)
  weight_decay: 0.01
  warmup: 1000
  grad_clip: 1.0

schedule:
  steps: 40000             # batch 64 x 40k ~= batch 128 x 20k -> same token budget as M5
  log_every: 50
  val_every: 1000          # best-val checkpoint restored at the end

runtime:
  device: null
  bf16: true

checkpoint:
  out: ${paths.runs}/m5_65m.pt
